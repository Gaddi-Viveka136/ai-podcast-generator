<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — AI Podcast Generator</title>
  <link rel="stylesheet" href="css/auth.css"/>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">🔑</div>
      <h1 class="auth-title">Reset Password</h1>
      <p class="auth-sub">Enter your email and choose a new password</p>

      <div id="errorBox"   class="alert alert-error"   style="display:none"></div>
      <div id="successBox" class="alert alert-success" style="display:none"></div>

      <form id="resetForm" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required autocomplete="email"/>
        </div>
        <div class="field">
          <label for="newPassword">New Password <span class="hint-inline">(min 6 chars)</span></label>
          <input type="password" id="newPassword" placeholder="••••••••" required/>
        </div>
        <div class="field">
          <label for="confirmPassword">Confirm New Password</label>
          <input type="password" id="confirmPassword" placeholder="••••••••" required/>
        </div>
        <button type="submit" class="btn-auth" id="submitBtn">Reset Password</button>
      </form>

      <p class="auth-switch"><a href="login.html">← Back to Sign In</a></p>
    </div>
  </div>
  <script src="js/config.js"></script>
  <script>
    const API = (window.BACKEND_URL || 'http://localhost:5000') + '/api';

    function showError(msg) {
      document.getElementById('errorBox').textContent = msg;
      document.getElementById('errorBox').style.display = 'block';
      document.getElementById('successBox').style.display = 'none';
    }
    function showSuccess(msg) {
      document.getElementById('successBox').textContent = msg;
      document.getElementById('successBox').style.display = 'block';
      document.getElementById('errorBox').style.display = 'none';
    }
    function setLoading(loading) {
      const btn = document.getElementById('submitBtn');
      btn.disabled = loading;
      btn.textContent = loading ? 'Please wait…' : 'Reset Password';
    }

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email           = document.getElementById('email').value.trim();
      const newPassword     = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (!email)                          { showError('Please enter your email.'); return; }
      if (newPassword.length < 6)          { showError('Password must be at least 6 characters.'); return; }
      if (newPassword !== confirmPassword) { showError('Passwords do not match.'); return; }

      setLoading(true);
      try {
        const res  = await fetch(`${API}/auth/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, newPassword }),
        });
        const data = await res.json();
        if (!res.ok) { showError(data.error || 'Reset failed.'); return; }
        showSuccess('Password reset! Redirecting to login…');
        setTimeout(() => window.location.href = 'login.html', 2000);
      } catch {
        showError('Cannot reach server. Try again in a moment.');
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
