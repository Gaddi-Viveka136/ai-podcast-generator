<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — AI Podcast Generator</title>
  <link rel="stylesheet" href="css/auth.css"/>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">🎙️</div>
      <h1 class="auth-title">AI Podcast Generator</h1>
      <p class="auth-sub">Sign in to your account</p>

      <!-- Error box — hidden by default, shows forgot password link on wrong credentials -->
      <div id="errorBox" class="alert alert-error" style="display:none">
        <span id="errorMsg"></span>
        <a id="forgotLink" href="reset-password.html" class="forgot-inline" style="display:none">
          Forgot password?
        </a>
      </div>

      <form id="loginForm" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required autocomplete="email"/>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password"/>
        </div>
        <button type="submit" class="btn-auth" id="submitBtn">Sign In</button>
      </form>

      <!-- Divider -->
      <div class="divider"><span>or</span></div>

      <!-- Google Sign-In -->
      <button id="googleBtn" class="btn-google">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="20"/>
        Continue with Google
      </button>

      <p class="auth-switch">Don't have an account? <a href="signup.html">Sign up</a></p>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const success = await handleLogin(
        document.getElementById('email').value,
        document.getElementById('password').value
      );
      // Show forgot password link only after a failed login
      if (!success) {
        document.getElementById('forgotLink').style.display = 'inline';
      }
    });

    // Google Sign-In
    document.getElementById('googleBtn').addEventListener('click', () => {
      const backendURL = window.BACKEND_URL || 'http://localhost:5000';
      // Test if Google OAuth is configured before redirecting
      fetch(backendURL + '/api/auth/google-status')
        .then(r => r.json())
        .then(data => {
          if (data.enabled) {
            window.location.href = backendURL + '/api/auth/google';
          } else {
            alert('Google Sign-In is not configured yet. Please use email/password to sign in.');
          }
        })
        .catch(() => {
          window.location.href = backendURL + '/api/auth/google';
        });
    });
  </script>
</body>
</html>
